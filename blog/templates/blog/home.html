<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
        <title>Django Blog - {{ title }}</title>
    {% else %}
        <title>Document</title>
    {% endif %}
</head>
<body>
    <h1>Blog's home page!</h1>

    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <h3>By: {{ post.author }} on {{ post.date }}</h3>
        <p>{{ post.content }}</p>
    {% endfor %}

</body>
</html>
